# Sources section

source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/keybindings.conf

# Exec-once section

exec-once = waybar
exec-once = hyprctl setcursor Bibata-Modern-Ice 16 
exec-once = mpvpaper -vs -o "no-audio loop" "*" night-sky.3840x2160.mp4

exec-once = discord && sleep 10 && hyprctl dispatch movetoworkspacesilent special:social
exec-once = Telegram && sleep 3 && hyprctl dispatch movetoworkspacesilent special:social

input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle,
    bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
    bind = , XF86AudioLowerVolume, exec, pamixer -d 5
    bind = , XF86AudioMicMute, exec, pamixer --default-source -m
    bind = , XF86AudioMute, exec, pamixer -t
    bind = , XF86AudioPlay, exec, playerctl play-pause
    bind = , XF86AudioPause, exec, playerctl play-pause
    bind = , XF86AudioNext, exec, playerctl next
    bind = , XF86AudioPrev, exec, playerctl previous
}

general {
    gaps_in = 3
    gaps_out = 4
    border_size = 1
}

decoration {
    rounding = 10
    blur {
      enabled = true
      size = 8
      passes = 3
      new_optimizations = true
      noise = 0.01
      contrast = 1.0
      brightness = 1.0
    }
}

workspace = 1, monitor:HDMI-A-1, default:true
workspace = 3, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

workspace = 2, monitor:DP-1, default:true
workspace = 4, monitor:DP-1
