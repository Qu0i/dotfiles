# Import user configuration
source = ~/.config/hypr/variables.conf

# Window navigation
bind = $mainMod, $right, movefocus, r
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $down, movefocus, d

# Move windows
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $right, movewindow, r
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $down, movewindow, d

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod, O, togglefloating
bind = $mainMod, F, fullscreen, 1
bind = ALT, Tab, cyclenext

# Resize windows
binde = $mainMod CTRL, $right, resizeactive, 50 0
binde = $mainMod CTRL, $left, resizeactive, -50 0
binde = $mainMod CTRL, $up, resizeactive, 0 -50
binde = $mainMod CTRL, $down, resizeactive, 0 50

# Workspace management
bind = $mainMod SHIFT, 1, movecurrentworkspacetomonitor, $mainMonitor
bind = $mainMod SHIFT, 2, movecurrentworkspacetomonitor, $leftMonitor
bind = $mainMod SHIFT, TAB, swapactiveworkspaces, $mainMonitor $leftMonitor

# Switch to workspaces 1–9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, togglespecialworkspace, social
bind = $mainMod, F8, togglespecialworkspace, back

# Move window to workspace
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5
bind = $mainMod ALT, 6, movetoworkspacesilent, 6
bind = $mainMod ALT, 7, movetoworkspacesilent, 7
bind = $mainMod ALT, 8, movetoworkspacesilent, 8
bind = $mainMod ALT, 9, movetoworkspacesilent, 9
bind = $mainMod ALT, 0, movetoworkspacesilent, special:social
bind = $mainMod ALT, F8, movetoworkspacesilent, special:back

# Applications
bind = $mainMod, T, exec, $terminal
bind = $mainMod, D, exec, $launcher
bind = $mainMod, INSERT, exec, waybar
bind = $mainMod, DELETE, exec, killall waybar
bind = $mainMod, N, exec, $fileManager

# Screenshots
bind = $mainMod, Print, exec, hyprshot -m output -o active
bind = $mainMod SHIFT, Print, exec, slurp | grim -g - - | wl-copy -t image/png

# Volume
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
