# Window navigation
bind = SUPER, L, movefocus, r
bind = SUPER, H, movefocus, l
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Move windows
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Window management
bind = SUPER, Q, killactive
bind = SUPER, O, togglefloating
bind = SUPER, F, fullscreen, 1 
bind = ALT, Tab, cyclenext


# Resize windows
binde = SUPER CTRL, L, resizeactive, 50 0
binde = SUPER CTRL, H, resizeactive, -50 0
binde = SUPER CTRL, K, resizeactive, 0 -50
binde = SUPER CTRL, J, resizeactive, 0 50

# Workspace management
bind = SUPER SHIFT, 1, movecurrentworkspacetomonitor, HDMI-A-1
bind = SUPER SHIFT, 2, movecurrentworkspacetomonitor, DP-1
bind = SUPER SHIFT, TAB, swapactiveworkspaces, HDMI-A-1 DP-1

# Switch to workspaces 1–9
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, togglespecialworkspace, social
bind = SUPER, F8, togglespecialworkspace, back

# Move window to workspace
bind = SUPER ALT, 1, movetoworkspacesilent, 1
bind = SUPER ALT, 2, movetoworkspacesilent, 2
bind = SUPER ALT, 3, movetoworkspacesilent, 3
bind = SUPER ALT, 4, movetoworkspacesilent, 4
bind = SUPER ALT, 5, movetoworkspacesilent, 5
bind = SUPER ALT, 6, movetoworkspacesilent, 6
bind = SUPER ALT, 7, movetoworkspacesilent, 7
bind = SUPER ALT, 8, movetoworkspacesilent, 8
bind = SUPER ALT, 9, movetoworkspacesilent, 9
bind = SUPER ALT, 0, movetoworkspacesilent, special:social
bind = SUPER ALT, F8, movetoworkspacesilent, special:back

# Applications
bind = SUPER, T, exec, kitty
bind = SUPER, D, exec, wofi --show drun
bind = SUPER, INSERT, exec, waybar
bind = SUPER, DELETE, exec, killall waybar
bind = SUPER, N, exec, nemo

# Screenshots
bind = SUPER, Print, exec, hyprshot -m output -o active
bind = SUPER SHIFT, Print, exec, slurp | grim -g - - | wl-copy -t image/png

# Volume
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
