# ~/.config/hypr/hyprlock.conf

background {
    color = rgba(30,30,34,0.95)
}

input-field {
    monitor =
    size = 260, 70
    rounding = 12
    outline_thickness = 2

    outer_color = rgba(92,95,102,0.8)
    inner_color = rgba(40,40,44,0.9)
    font_color = rgba(224,224,224,1.0)

    fade_on_empty = true
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    placeholder_text = Введите пароль…
    fail_text = Неверный пароль
    fail_color = rgba(200,80,80,1.0)

    font = JetBrains Mono
}

general {
    position = 0, 0
    halign = center
    valign = center
}
